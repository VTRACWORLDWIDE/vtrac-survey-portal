services:
  postgres:
    image: postgres:16-alpine
    container_name: vtrac-survey-postgres
    environment:
      POSTGRES_DB: vtrac_survey
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    volumes:
      - vtrac_survey_pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vtrac_survey"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  vtrac_survey_pgdata:
